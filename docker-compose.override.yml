version: '3.8'

services:
  seeder:
    image: python:3.12-slim
    container_name: mp_seeder
    depends_on:
      - mosquitto
    networks:
      - mp_net
    volumes:
      - ./docker/seed_publisher.py:/seed_publisher.py:ro
    entrypoint: ["sh", "-c", "pip install --no-cache-dir paho-mqtt && python /seed_publisher.py"]

  simulator:
    volumes:
      - ./src/simulator:/app
      - ./docker/simulator:/app/data
    command: ["sh", "-c", "python sensor_simulator.py"]

  subscriber:
    build:
      context: .
      dockerfile: docker/Dockerfile.simulator
    container_name: mp_subscriber
    environment:
      - CMD=subscriber.py
    user: "0:0"
    depends_on:
      - mosquitto
    volumes:
      - ./src/simulator:/app
      - ./docker/simulator:/app/data
    networks:
      - mp_net

  api:
    environment:
      - DOTNET_RUNNING_IN_CONTAINER=true
    # Override Dockerfile healthcheck: aspnet:8.0 slim image has no curl.
    # wget is equally absent; the simplest fix for dev is /bin/sh TCP check.
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/status | grep -q VmRSS && echo ok || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      # DB is written by subscriber to ./docker/simulator/iot.db;
      # API reads it at /app/simulator/iot.db (path expected by Program.cs)
      - ./docker/simulator:/app/simulator:ro

volumes:
  simulator_data:

networks:
  mp_net:
    external: false
